<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
    background: #0a1628;
    color: #fff;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 顶部标题 */
  .header {
    text-align: center;
    padding: 30px 20px 10px;
  }

  .header h1 {
    font-size: 42px;
    background: linear-gradient(135deg, #FFD54F, #FF9800, #FF5722);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }

  .header p {
    color: #90CAF9;
    font-size: 18px;
  }

  .back-link {
    display: inline-block;
    margin-top: 12px;
    padding: 8px 24px;
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 30px;
    color: #B0BEC5;
    text-decoration: none;
    font-size: 14px;
    transition: all 0.3s;
  }

  .back-link:hover {
    border-color: #FFD54F;
    color: #FFD54F;
  }

  /* 地区Tab */
  .region-tabs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    padding: 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .region-tab {
    padding: 10px 22px;
    border-radius: 30px;
    border: 2px solid rgba(255,255,255,0.2);
    background: transparent;
    color: #B0BEC5;
    cursor: pointer;
    font-size: 15px;
    transition: all 0.3s;
  }

  .region-tab.active {
    border-color: #FFD54F;
    color: #FFD54F;
    background: rgba(255,213,79,0.15);
    font-weight: bold;
  }

  .region-tab:hover {
    border-color: #FFD54F;
    color: #FFD54F;
  }

  /* 省份网格 */
  .province-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
    padding: 10px 20px 40px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .province-card {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px 16px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }

  .province-card:hover {
    border-color: #FFD54F;
    transform: translateY(-5px);
    box-shadow: 0 10px 30px rgba(255,213,79,0.15);
  }

  .province-card .p-emoji { font-size: 40px; display: block; margin-bottom: 8px; }
  .province-card .p-avatar { width: 52px; height: 52px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 8px; border: 2px solid rgba(255,213,79,0.5); background: rgba(0,0,0,0.3); }
  .province-card .p-name { font-size: 18px; font-weight: bold; color: #fff; }
  .province-card .p-count { font-size: 12px; color: #90CAF9; margin-top: 6px; }

  /* 图片模态框 */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.92);
    z-index: 1000;
    display: none;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(5px);
  }

  .modal-overlay.active { display: flex; }

  .modal-content {
    width: 92%;
    max-width: 1100px;
    background: #0f1f3a;
    border-radius: 24px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    max-height: 92vh;
    border: 1px solid rgba(255,255,255,0.1);
  }

  .modal-header {
    padding: 18px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .modal-header h2 {
    margin: 0;
    color: #FFD54F;
    font-size: 24px;
  }

  .modal-close {
    background: rgba(255,255,255,0.1);
    border: none;
    color: #fff;
    font-size: 24px;
    cursor: pointer;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    transition: all 0.3s;
  }

  .modal-close:hover { background: rgba(255,87,34,0.5); }

  .modal-body {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .modal-image-area {
    flex: 2;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
    position: relative;
    min-height: 400px;
  }

  .modal-image-area img {
    max-width: 100%;
    max-height: 58vh;
    object-fit: contain;
    transition: opacity 0.3s;
  }

  .modal-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    border: 2px solid rgba(255,255,255,0.3);
    color: #fff;
    font-size: 20px;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-nav:hover { background: rgba(255,213,79,0.3); border-color: #FFD54F; }
  .modal-nav.prev { left: 16px; }
  .modal-nav.next { right: 16px; }

  .modal-info {
    flex: 1;
    padding: 24px;
    overflow-y: auto;
    min-width: 260px;
  }

  .modal-info h3 {
    color: #FFD54F;
    margin-bottom: 12px;
    font-size: 20px;
  }

  .modal-info .info-line {
    color: #B0BEC5;
    line-height: 2;
    font-size: 15px;
  }

  .modal-info .info-line strong { color: #fff; }

  .modal-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(0,0,0,0.8));
    padding: 30px 20px 16px;
    text-align: center;
    color: #FFD54F;
    font-size: 16px;
    font-weight: bold;
  }

  .modal-thumbs {
    display: flex;
    gap: 10px;
    padding: 14px 20px;
    overflow-x: auto;
    border-top: 1px solid rgba(255,255,255,0.1);
    background: rgba(0,0,0,0.3);
  }

  .modal-thumb {
    width: 64px;
    height: 64px;
    border-radius: 8px;
    object-fit: cover;
    cursor: pointer;
    border: 2px solid transparent;
    opacity: 0.5;
    transition: all 0.3s;
    flex-shrink: 0;
  }

  .modal-thumb.active { border-color: #FFD54F; opacity: 1; }
  .modal-thumb:hover { opacity: 0.8; }
  .modal-thumb.png-thumb { border-radius: 50%; border: 2px dashed rgba(255,213,79,0.4); }

  /* 响应式 */
  @media (max-width: 768px) {
    .modal-body { flex-direction: column; }
    .modal-info { min-width: auto; padding: 16px; }
    .modal-image-area { min-height: 250px; }
    .province-grid { grid-template-columns: repeat(3, 1fr); padding: 10px; }
    .header h1 { font-size: 28px; }
  }

  /* 背景星星装饰 */
  .bg-stars {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: -1;
    overflow: hidden;
  }

  .bg-star {
    position: absolute;
    width: 2px; height: 2px;
    background: #fff;
    border-radius: 50%;
    animation: twinkle 3s ease-in-out infinite;
  }

  @keyframes twinkle { 0%,100%{ opacity: 0.2; } 50%{ opacity: 1; } }

  .image-counter {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(0,0,0,0.5);
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 13px;
    color: #B0BEC5;
  }
</style>

// ========== 渲染地区Tab ==========
let currentRegion = 'huabei';
let currentProvince = null;
let currentImageIdx = 0;

function init() {
  const tabsContainer = document.getElementById('regionTabs');
  const regionKeys = Object.keys(provinceData);
  
  regionKeys.forEach((key, idx) => {
    const btn = document.createElement('button');
    btn.className = 'region-tab' + (idx === 0 ? ' active' : '');
    btn.textContent = provinceData[key].name;
    btn.onclick = () => switchRegion(key);
    tabsContainer.appendChild(btn);
  });
  
  showRegion('huabei');
  createStars();
}

function switchRegion(region) {
  currentRegion = region;
  document.querySelectorAll('.region-tab').forEach((tab, idx) => {
    tab.classList.toggle('active', Object.keys(provinceData)[idx] === region);
  });
  showRegion(region);
}

function showRegion(region) {
  const grid = document.getElementById('provinceGrid');
  grid.innerHTML = '';
  const data = provinceData[region];
  
  Object.entries(data.provinces).forEach(([name, info]) => {
    const totalImages = info.images.length + (info.pngImages ? info.pngImages.length : 0);
    const card = document.createElement('div');
    card.className = 'province-card';
    const emojiHtml = info.avatar
      ? `<img src="${info.avatar}" class="p-avatar" alt="${name}" onerror="this.outerHTML='<span class=\\'p-emoji\\'>${info.emoji}</span>'">`
      : `<span class="p-emoji">${info.emoji}</span>`;
    card.innerHTML = `
      ${emojiHtml}
      <div class="p-name">${name}</div>
      <div class="p-count">${totalImages} 张图片</div>
    `;
    card.onclick = () => openModal(region, name);
    grid.appendChild(card);
  });
}

// ========== 模态框 ==========
let currentAllImages = [];

function openModal(region, provinceName) {
  currentProvince = { region, name: provinceName };
  currentImageIdx = 0;
  
  const info = provinceData[region].provinces[provinceName];
  
  // 合并JPG和PNG图片
  currentAllImages = [];
  info.images.forEach(img => currentAllImages.push({ ...img, folder: 'images/' }));
  if (info.pngImages) {
    info.pngImages.forEach(img => currentAllImages.push({ ...img, folder: 'png-images/' }));
  }
  
  document.getElementById('modalTitle').textContent = `${info.emoji} ${provinceName}`;
  document.getElementById('modalInfoTitle').textContent = `${provinceName} · ${info.abbr}`;
  document.getElementById('modalInfoText').innerHTML = `
    <strong>简称：</strong>${info.abbr}<br>
    <strong>省会：</strong>${info.capital}<br>
    <strong>特色：</strong>${info.feature}<br>
    <strong>图片数：</strong>${currentAllImages.length} 张
  `;
  
  // 缩略图
  const thumbsContainer = document.getElementById('modalThumbs');
  thumbsContainer.innerHTML = '';
  currentAllImages.forEach((img, idx) => {
    const thumb = document.createElement('img');
    const isPng = img.folder === 'png-images/';
    thumb.className = 'modal-thumb' + (idx === 0 ? ' active' : '') + (isPng ? ' png-thumb' : '');
    thumb.src = img.folder + img.file;
    thumb.onclick = () => showImage(idx);
    thumbsContainer.appendChild(thumb);
  });
  
  document.getElementById('modalOverlay').classList.add('active');
  showImage(0);
}

function showImage(idx) {
  currentImageIdx = idx;
  
  const imgEl = document.getElementById('modalImage');
  imgEl.style.opacity = '0.5';
  
  setTimeout(() => {
    imgEl.src = currentAllImages[idx].folder + currentAllImages[idx].file;
    imgEl.style.opacity = '1';
  }, 150);
  
  document.getElementById('modalCaption').textContent = currentAllImages[idx].caption;
  document.getElementById('imageCounter').textContent = `${idx + 1} / ${currentAllImages.length}`;
  
  document.querySelectorAll('.modal-thumb').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
}

function nextImage() {
  showImage((currentImageIdx + 1) % currentAllImages.length);
}

function prevImage() {
  showImage((currentImageIdx - 1 + currentAllImages.length) % currentAllImages.length);
}

function closeModal(e) {
  if (!e || e.target.id === 'modalOverlay') {
    document.getElementById('modalOverlay').classList.remove('active');
  }
}

// 键盘控制
document.addEventListener('keydown', e => {
  if (!document.getElementById('modalOverlay').classList.contains('active')) return;
  if (e.key === 'ArrowRight') nextImage();
  if (e.key === 'ArrowLeft') prevImage();
  if (e.key === 'Escape') closeModal();
});

// ========== 背景星星 ==========
function createStars() {
  const container = document.getElementById('bgStars');
  for (let i = 0; i < 60; i++) {
    const star = document.createElement('div');
    star.className = 'bg-star';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 3 + 's';
    star.style.width = star.style.height = (Math.random() * 3 + 1) + 'px';
    container.appendChild(star);
  }
}

// 初始化
init();
